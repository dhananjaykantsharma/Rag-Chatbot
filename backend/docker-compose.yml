version: '3.8'

services:
  # 1. Aapka Python App
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - HUGGING_FACE_API_KEY=your_actual_hf_token_here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    # Docker inside network se DNS easily resolve kar leta hai
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # 2. Redis Server (Jo pehle crash ho raha tha)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"